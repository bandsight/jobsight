name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Fetch Jobs
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build generated public site
        run: |
          jobsight public
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path("public/index.html")
          board_path = Path("public/data/job-board-data.json")
          if index_path.exists() and board_path.exists():
              safe_json = board_path.read_text(encoding="utf-8").replace("</", "<\\/")
              inline = f'<script id="jobsight-board-data" type="application/json">{safe_json}</script>'
              text = index_path.read_text(encoding="utf-8")
              text = re.sub(
                  r'<script id="jobsight-board-data" type="application/json">.*?</script>',
                  inline,
                  text,
                  count=1,
                  flags=re.DOTALL,
              )
              index_path.write_text(text, encoding="utf-8")
          PY
          python - <<'PY'
          from pathlib import Path
          import json

          board = json.loads(Path("public/data/job-board-data.json").read_text(encoding="utf-8"))
          expected = board["summary"]["generated_at"]
          html = Path("public/index.html").read_text(encoding="utf-8")
          if expected not in html:
              raise SystemExit(f"public/index.html inline data is stale; missing {expected}")
          print(f"Verified public/index.html contains inline data from {expected}")
          PY

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
